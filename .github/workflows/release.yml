name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Verify before releasing ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/ --config pyproject.toml

      - name: Run tests
        run: pytest tests/ -q -m "not integration"

  # ── Build distribution ──────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Publish to PyPI (Trusted Publishing / OIDC) ─────────────────
  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── Create GitHub Release ───────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          # Extract the section between this version header and the next one
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

          # If no exact match, try without brackets
          if [ -z "$NOTES" ]; then
            NOTES="Release ${VERSION} — see [CHANGELOG.md](CHANGELOG.md) for details."
          fi

          # Write to file to preserve multiline content
          echo "$NOTES" > /tmp/release_notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: /tmp/release_notes.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'a') || contains(steps.version.outputs.version, 'b') || contains(steps.version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Mirror release ZIP to HuggingFace + ModelScope ──────────────
  mirror:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create source ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git archive --format=zip --prefix=ComfyUI-Auto_installer/ HEAD \
            -o /tmp/ComfyUI-Auto_installer-latest.zip
          echo "--- ZIP created ---"
          ls -lh /tmp/ComfyUI-Auto_installer-latest.zip
          sha256sum /tmp/ComfyUI-Auto_installer-latest.zip

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python3 -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_file(
              path_or_fileobj='/tmp/ComfyUI-Auto_installer-latest.zip',
              path_in_repo='releases/ComfyUI-Auto_installer-latest.zip',
              repo_id='UmeAiRT/ComfyUI-Auto-Installer-Assets',
              repo_type='model',
              commit_message='CI: Upload release ${{ steps.version.outputs.version }} ZIP',
          )
          print('Uploaded to HuggingFace.')
          "

      - name: Upload to ModelScope
        continue-on-error: true
        env:
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        run: |
          pip install modelscope numpy
          python3 -c "
          from modelscope.hub.api import HubApi
          import os
          api = HubApi(endpoint='https://www.modelscope.ai')
          api.login(os.environ['MODELSCOPE_API_TOKEN'])
          api.upload_file(
              path_or_fileobj='/tmp/ComfyUI-Auto_installer-latest.zip',
              path_in_repo='releases/ComfyUI-Auto_installer-latest.zip',
              repo_id='UmeAiRT/ComfyUI-Auto-Installer-Assets',
              repo_type='dataset',
              commit_message='CI: Upload release ${{ steps.version.outputs.version }} ZIP',
          )
          print('Uploaded to ModelScope.')
          "
